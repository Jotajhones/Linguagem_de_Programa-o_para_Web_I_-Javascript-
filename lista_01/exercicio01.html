<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 01</title>

    <style>
        * {
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: #F26B6B;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        main {
            margin: 50px auto;
            background-color: white;
            box-shadow: 3px 3px 5px 5px rgba(0, 0, 0, 0.3);
            width: 450px;
            padding: 20px;
            border-radius: 3px;
        }

        main h1 {
            margin-bottom: 20px;
        }

        main p {
            margin-block: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form input {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;

        }

        form input:focus {
            border-color: #F26B6B;
            outline: none;
        }

        form label {
            margin-bottom: 5px;
        }

        form .button {
            padding: 10px 20px;
            background-color: #F26B6B;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            width: 150px;
            margin: 20px auto;
        }


        .button:hover {
            background-color: #f04949;
        }
    </style>
</head>

<body>
    <main>

        <h1>Exercicio 01</h1>

        <form class="form" action="#">

            <label for="idade">Digite sua idade:</label>
            <input type="text" id="idade" placeholder="Digite sua idade">

            <button type="button" class="button">Finalizar</button>
        </form>

    </main>

    <script>


        document.addEventListener('DOMContentLoaded', () => {

            const idadeInput = document.querySelector('#idade');
            idadeInput.focus();

            document.querySelector('button').addEventListener('click', (e) => {

                e.preventDefault();

                const main = document.querySelector('main');

                const idade = idadeInput.value;

                if (isNaN(idade) || idade.trim() === "") {
                    alert("Por favor, digite uma idade válida.");
                    return;
                } else {

                    const p = document.createElement('p');
                    p.textContent = `Sua idade é ${idade} anos. Em 5 anos, você terá ${Number(idade) + 5} anos.`;

                    main.appendChild(p);

                    idadeInput.value = "";
                }

            })

        });


    </script>
</body>

</html>
