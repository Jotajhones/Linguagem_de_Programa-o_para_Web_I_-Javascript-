<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 03</title>

    <style>
        * {
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: #F26B6B;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        main {
            margin: 50px auto;
            background-color: white;
            box-shadow: 3px 3px 5px 5px rgba(0, 0, 0, 0.3);
            width: 450px;
            padding: 20px;
            border-radius: 3px;
        }

        main h1 {
            margin-bottom: 20px;
        }

        main p {
            margin-block: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form input {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;

        }

        form input:focus {
            border-color: #F26B6B;
            outline: none;
        }

        form label {
            margin-bottom: 5px;
        }

        form .button {
            padding: 10px 20px;
            background-color: #F26B6B;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            width: 150px;
            margin: 20px auto;
        }

        .button:hover {
            background-color: #f04949;
        }
    </style>
</head>

<body>
    <main>

        <h1>Exercicio 03</h1>

        <form class="form">
            <label for="nome">Digite seu nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

            <label for="sobrenome">Digite seu sobrenome: </label>
            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome">

            <button type="submit" class="button">Finalizar</button>
        </form>

        <div class="resultados">

        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('.form');

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const inputNome = document.querySelector('#nome');
                const inputSobrenome = document.querySelector('#sobrenome');
                const resultados = document.querySelector('.resultados');

                let nome = inputNome.value;
                let sobrenome = inputSobrenome.value;

                resultados.innerHTML = '';

                if (nome && sobrenome) {
                    const p = document.createElement('p');
                    p.innerHTML = `Olá, seja bem vindo ${nome} ${sobrenome}`;

                    resultados.appendChild(p);

                    inputNome.value = '';
                    inputSobrenome.value = '';

                    inputNome.focus();

                } else {
                    alert("Por favor, preencha todos os campos.");
                }
            });
        });
    </script>
</body>

</html>
