<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 19</title>

    <style>
        * {
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: #053259;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        main {
            margin: 50px auto;
            background-color: white;
            box-shadow: 3px 3px 5px 5px rgba(0, 0, 0, 0.3);
            width: 450px;
            padding: 20px;
            border-radius: 3px;
        }

        main h1 {
            margin-bottom: 20px;
        }

        main p {
            margin-block: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form input {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;

        }

        form input:focus {
            border-color: #0F2ABF;
            outline: none;
        }

        form label {
            margin-bottom: 5px;
        }

        .button {
            padding: 10px 20px;
            background-color: #F2AE2E;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            width: 150px;
            margin: 5px auto;
        }

        .button:hover {
            background-color: #b98523;
        }

        strong,
        b {
            color: #0388A6;
        }
    </style>
</head>

<body>
    <main>

        <h1>Exercicio 19</h1>

        <button type="submit" class="button buttonAlterar">Finalizar</button>

        <div class="resultados">

        </div>
    </main>

    <script>

        const arr = [2, 5, 8, 11, 14];

        document.addEventListener('DOMContentLoaded', () => {

            const resultado = document.querySelector('.resultados');

            resultado.innerHTML += "<p><b>Array original</b>: " + arr.join(", ") + "</p>";

            const button = document.querySelector('.buttonAlterar');
            button.addEventListener('click', (e) => {

                e.preventDefault();

                resultado.innerHTML = "";

                resultado.innerHTML += "<p><b>Array original</b>: " + arr.join(", ") + "</p>";

                const newArr = arr.filter(num => num > 5);
                resultado.innerHTML += "<p><b>Array filtrado para maiores que 5</b>: " + newArr.join(", ") + "</p>";

                const arrDobrado = newArr.map(num => num * 2);
                resultado.innerHTML += "<p><b>Array com números dobrados</b>: " + arrDobrado.join(", ") + "</p>";

            });
        });

    </script>
</body>

</html>
